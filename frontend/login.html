<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Going Bilingual | Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-layout">

  <div class="login-image">
    <img src="assets/img/hero-image.jpg" alt="Students learning languages">
  </div>

  <div class="login-form-container">

    <div class="login-form-box">

      <h1>Going Bilingual</h1>
      <p class="login-subtitle">Accede a tu plataforma de aprendizaje</p>

      <form class="login-form">

        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="tu@email.com" required>
        </div>

        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" placeholder="********" required>
        </div>

        <button class="btn btn-primary login-btn">
          Iniciar sesión
        </button>

      </form>

      <p class="login-footer">
        ¿Olvidaste tu contraseña?
      </p>

      <a href="index.html" class="login-back">
        Volver al inicio
      </a>

    </div>

  </div>

</div>

</body>
</html>
